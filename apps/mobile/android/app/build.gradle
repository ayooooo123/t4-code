import groovy.json.JsonSlurper

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

def mobilePackage = new JsonSlurper().parse(rootProject.file('../package.json'))
def mobileVersionName = System.getenv('T4_ANDROID_VERSION_NAME') ?: mobilePackage.version
def versionParts = mobileVersionName.tokenize('.').collect { part ->
    def match = part =~ /^(\d+)/
    match.find() ? match.group(1).toInteger() : 0
}
while (versionParts.size() < 3) versionParts.add(0)
def defaultVersionCode = versionParts[0] * 1000000 + versionParts[1] * 10000 + versionParts[2]
def mobileVersionCode = (System.getenv('T4_ANDROID_VERSION_CODE') ?: defaultVersionCode.toString()).toInteger()

def releaseKeystorePath = System.getenv('T4_ANDROID_KEYSTORE_PATH')
def releaseKeystorePassword = System.getenv('T4_ANDROID_KEYSTORE_PASSWORD')
def releaseKeyAlias = System.getenv('T4_ANDROID_KEY_ALIAS')
def releaseKeyPassword = System.getenv('T4_ANDROID_KEY_PASSWORD')
def hasReleaseSigning = [
    releaseKeystorePath,
    releaseKeystorePassword,
    releaseKeyAlias,
    releaseKeyPassword,
].every { value -> value != null && !value.isBlank() }

android {
    namespace = "com.lycaonsolutions.t4code"
    compileSdk = rootProject.ext.compileSdkVersion
    buildFeatures {
        buildConfig = true
    }
    defaultConfig {
        applicationId "com.lycaonsolutions.t4code"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode mobileVersionCode
        versionName mobileVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        ndk {
            abiFilters 'arm64-v8a'
        }
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    sourceSets {
        main.java.srcDirs += rootProject.file('../../../third_party/hyperdht-cpp/wrappers/kotlin/src/main/kotlin')
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
    kotlinOptions {
        jvmTarget = '21'
    }
    signingConfigs {
        if (hasReleaseSigning) {
            release {
                storeFile file(releaseKeystorePath)
                storePassword releaseKeystorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (hasReleaseSigning) signingConfig signingConfigs.release
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1'
    implementation 'androidx.camera:camera-camera2:1.5.2'
    implementation 'androidx.camera:camera-core:1.5.2'
    implementation 'androidx.camera:camera-lifecycle:1.5.2'
    implementation 'androidx.camera:camera-view:1.5.2'
    implementation 'com.google.mlkit:barcode-scanning:17.3.0'
}

def hyperdhtSource = rootProject.file('../../../third_party/hyperdht-cpp')
tasks.register('buildHyperdhtAndroid', Exec) {
    inputs.dir(hyperdhtSource)
    outputs.file(file('src/main/jniLibs/arm64-v8a/libhyperdht_jni.so'))
    workingDir rootProject.file('..')
    commandLine(System.getenv('NODE') ?: 'node', 'scripts/build-hyperdht-android.mjs')
}
preBuild.dependsOn(tasks.named('buildHyperdhtAndroid'))

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
